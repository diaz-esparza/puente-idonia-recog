services:

  puente:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - serve
    depends_on:
      - otelcol
    ports:
      - ${PUENTE_APP_PORT:-8000}:${PUENTE_APP_PORT:-8000}
    env_file:
      - path: .env
        required: false
    environment:
      PUENTE_OTEL_ENDPOINT: otelcol:4317
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - puente
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    depends_on:
      - tempo
      - loki
    command:
      - --config=/etc/otelcol.yaml
    volumes:
      - ./config/otelcol.yaml:/etc/otelcol.yaml:ro
    expose:
      - '4317' # gRPC

  tempo:
    image: grafana/tempo:latest
    command:
      - --config.file=/etc/tempo.yaml
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
    expose:
      - '3200'
      - '4317'

  loki:
    image: grafana/loki:latest
    command:
      - --config.file=/etc/loki/local-config.yaml
    expose:
      - '3100'

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/puente.yaml:ro
    ports:
      - 3000:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
