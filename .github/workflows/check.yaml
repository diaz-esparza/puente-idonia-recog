name: Check


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


permissions:
  contents: read


jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - run: uv sync

      - run: make check
