# Taken from module defaults, with slight changes for things we don't need.
# Read the NOTE comments for changes to be ready for in future releases.

supported_languages:
  - es

## NOTE: Uncomment in the next Presidio release (>2.2.362)
#
# supported_countries:
#   - es

default_score_threshold: 0.5


nlp_configuration:
  nlp_engine_name: spacy
  models:
    - lang_code: es
      model_name: es_core_news_sm

  ner_model_configuration:
    model_to_presidio_entity_mapping:
      PER: PERSON
      PERSON: PERSON
      NORP: NRP
      FAC: LOCATION
      LOC: LOCATION
      LOCATION: LOCATION
      GPE: LOCATION
      ORG: ORGANIZATION
      ORGANIZATION: ORGANIZATION

    low_confidence_score_multiplier: 0.4
    low_score_entity_names: []
    labels_to_ignore:
      - ORG
      - ORGANIZATION  # has many false positives
      - CARDINAL
      - EVENT
      - LANGUAGE
      - LAW
      - MONEY
      - ORDINAL
      - PERCENT
      - PRODUCT
      - QUANTITY
      - WORK_OF_ART
      # Potentially important for a health diagnoses
      - DATE
      - TIME


recognizer_registry:

  global_regex_flags: 26

  recognizers:
    - name: SpacyRecognizer
      supported_languages:
        - es
      type: predefined

    - name: CreditCardRecognizer
      supported_languages:
        - language: es
          context:
            - tarjeta
            - credito
            - visa
            - mastercard
            - cc
            - amex
            - discover
            - jcb
            - diners
            - maestro
            - instapayment
      type: predefined

    - name: IbanRecognizer
      type: predefined

    - name: EmailRecognizer
      type: predefined

    - name: PhoneRecognizer
      type: predefined

    - name: EsNifRecognizer
      supported_languages:
        - es
      type: predefined
      country_code: es

    - name: EsNieRecognizer
      supported_languages:
        - es
      type: predefined
      country_code: es

  ## NOTE: To be available in the next Presidio release (>2.2.362)
  # - name: EsPassportRecognizer
  #   supported_languages:
  #   - es
  #   type: predefined
  #   enabled: false
  #   country_code: es
