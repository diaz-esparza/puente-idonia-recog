receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317


processors:
  batch:


exporters:

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlp_http/loki:
    endpoint: http://loki:3100/loki/api/v1/push


service:
  pipelines:

    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp/tempo

    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp_http/loki
