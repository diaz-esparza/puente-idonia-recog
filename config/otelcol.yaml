receivers:
  otlp:
    protocols:
      grpc:


processors:
  batch:


exporters:

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push


service:
  pipelines:

    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp/tempo
        - otlphttp/audit

    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - loki
        - otlphttp/audit
