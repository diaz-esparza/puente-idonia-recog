receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317


processors:
  batch:


exporters:

  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  otlp_http/audit:
    endpoint: http://audit:8001/v1
    tls:
      insecure: true


service:
  pipelines:

    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp_grpc/tempo
        - otlp_http/audit

    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp_http/loki
        - otlp_http/audit
