services:
  puente:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puente
    ports:
      - ${PUENTE_APP_PORT:-8000}:8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import httpx
          httpx.get("http://localhost:8000/health").raise_for_status()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
